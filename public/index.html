<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="juno's portfolio" />
    <title>juno kim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ── Animations ───────────────────────────────────────────── */
      @keyframes gradient-shift {
        0%, 100% { background-position: 0% 50%; }
        50%       { background-position: 100% 50%; }
      }

      @keyframes float-a {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        33%       { transform: translateY(-22px) rotate(2deg); }
        66%       { transform: translateY(-10px) rotate(-1deg); }
      }
      @keyframes float-b {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        40%       { transform: translateY(-18px) rotate(-2deg); }
        70%       { transform: translateY(-8px) rotate(1deg); }
      }
      @keyframes float-c {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-14px); }
      }

      @keyframes blob-morph {
        0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        25%       { border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%; }
        50%       { border-radius: 30% 70% 40% 60% / 70% 40% 60% 30%; }
        75%       { border-radius: 70% 30% 60% 40% / 30% 60% 40% 70%; }
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes shimmer-slide {
        0%   { transform: translateX(-150%); }
        100% { transform: translateX(200%); }
      }

      /* ── Gradient text ────────────────────────────────────────── */
      .gradient-text {
        background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8, #c084fc);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradient-shift 5s ease infinite;
      }

      /* ── Background blobs ─────────────────────────────────────── */
      .blob-a { animation: blob-morph 10s ease-in-out infinite,       float-a 8s ease-in-out infinite; }
      .blob-b { animation: blob-morph 12s ease-in-out infinite 2s,    float-b 9s ease-in-out infinite 1s; }
      .blob-c { animation: blob-morph  9s ease-in-out infinite 4s,    float-c 7s ease-in-out infinite 3s; }

      /* ── Staggered entrance animations ───────────────────────── */
      .fade-up-1 { animation: fade-up 0.7s ease 0.05s both; }
      .fade-up-2 { animation: fade-up 0.7s ease 0.2s  both; }
      .fade-up-3 { animation: fade-up 0.7s ease 0.35s both; }
      .fade-up-4 { animation: fade-up 0.7s ease 0.5s  both; }
      .fade-up-5 { animation: fade-up 0.7s ease 0.65s both; }

      /* ── Nav underline slide ──────────────────────────────────── */
      .nav-link {
        position: relative;
        text-decoration: none;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: -3px;
        left: 0;
        right: 0;
        height: 1px;
        background: #a855f7;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }
      .nav-link:hover::after { transform: scaleX(1); }

      /* ── Shimmer badge ────────────────────────────────────────── */
      .shimmer-badge {
        position: relative;
        overflow: hidden;
      }
      .shimmer-badge::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        animation: shimmer-slide 2.8s ease-in-out infinite;
      }

      /* ── Smooth scroll ────────────────────────────────────────── */
      html { scroll-behavior: smooth; }

      /* ── Selection colour ─────────────────────────────────────── */
      ::selection { background: rgba(168, 85, 247, 0.25); }
    </style>
</head>
<body style="margin:0;padding:0;">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
